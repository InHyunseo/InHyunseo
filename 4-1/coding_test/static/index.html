<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUE4023 코딩 테스트</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
<!-- marked: markdown renderer -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- CodeMirror core + Python mode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<!-- KaTeX: math rendering -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"
  onload="renderMathInElement(document.getElementById('problem-desc'), {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\\\(',right:'\\\\)',display:false},{left:'\\\\[',right:'\\\\]',display:true}]})"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }

  /* ── 상단 헤더 ── */
  #header {
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    padding: 0 16px;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #header h1 { font-size: 14px; color: #cccccc; font-weight: 600; white-space: nowrap; }
  #problem-select {
    flex: 1;
    max-width: 420px;
    background: #3c3c3c;
    color: #d4d4d4;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }
  .btn {
    padding: 5px 14px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  #btn-run   { background: #0e7a0d; color: #fff; }
  #btn-run:hover { background: #148212; }
  #btn-reveal { background: #3c3c3c; color: #ccc; border: 1px solid #555; }
  #btn-reveal:hover { background: #505050; }

  /* ── 메인 레이아웃 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 문제 패널 ── */
  #problem-panel {
    width: 42%;
    min-width: 280px;
    background: #252526;
    border-right: 1px solid #3c3c3c;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #problem-panel-header {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    background: #2d2d2d;
    border-bottom: 1px solid #3c3c3c;
    flex-shrink: 0;
  }
  #problem-desc {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 20px 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  #problem-desc h2 { font-size: 16px; color: #c5c5c5; margin: 0 0 12px; }
  #problem-desc h3 { font-size: 14px; color: #c5c5c5; margin: 14px 0 8px; }
  #problem-desc p  { margin: 6px 0; }
  #problem-desc ul, #problem-desc ol { margin: 6px 0 6px 20px; }
  #problem-desc li { margin: 3px 0; }
  #problem-desc code {
    background: #3a3a3a;
    color: #ce9178;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Consolas', monospace;
    font-size: 12.5px;
  }
  #problem-desc pre code {
    display: block;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 12.5px;
    line-height: 1.5;
  }
  #problem-desc strong { color: #dcdcaa; }

  /* ── 오른쪽 패널 (에디터 + 출력) ── */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 에디터 영역 */
  #editor-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #editor-header {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    background: #2d2d2d;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .CodeMirror {
    flex: 1;
    height: 100%;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    background: #1e1e1e;
  }
  .CodeMirror-scroll { height: 100%; }
  #editor-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* 출력 영역 */
  #output-panel {
    height: 200px;
    min-height: 120px;
    border-top: 1px solid #3c3c3c;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
    flex-shrink: 0;
  }
  #output-header {
    padding: 6px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    background: #2d2d2d;
    border-bottom: 1px solid #3c3c3c;
    flex-shrink: 0;
  }
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .out-stdout { color: #d4d4d4; }
  .out-stderr { color: #f48771; }
  .out-info   { color: #9cdcfe; font-style: italic; }
  .out-answer-label { color: #b5cea8; font-weight: 600; margin-top: 8px; display: block; }
  .out-answer { color: #ce9178; }

  /* 리사이저 */
  #resizer {
    width: 4px;
    background: #3c3c3c;
    cursor: col-resize;
    flex-shrink: 0;
  }
  #resizer:hover { background: #007acc; }

  /* 단축키 힌트 */
  .shortcut { font-size: 11px; color: #555; margin-left: 8px; }
</style>
</head>
<body>

<div id="header">
  <h1>AUE4023</h1>
  <select id="problem-select"></select>
  <button class="btn" id="btn-run">▶ 실행 <span class="shortcut">Ctrl+Enter</span></button>
  <button class="btn" id="btn-reveal">정답 보기</button>
</div>

<div id="main">
  <!-- 문제 -->
  <div id="problem-panel">
    <div id="problem-panel-header">문제</div>
    <div id="problem-desc"><span class="out-info">문제를 선택하세요.</span></div>
  </div>

  <div id="resizer"></div>

  <!-- 에디터 + 출력 -->
  <div id="right-panel">
    <div id="editor-wrapper">
      <div id="editor-header">
        <span>코드 작성</span>
      </div>
      <div id="editor-container">
        <textarea id="editor"></textarea>
      </div>
    </div>

    <div id="output-panel">
      <div id="output-header">출력</div>
      <div id="output"><span class="out-info">실행 결과가 여기에 표시됩니다.</span></div>
    </div>
  </div>
</div>

<script>
// ── CodeMirror 초기화 (자동완성 비활성화) ──
const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
  mode: 'python',
  theme: 'monokai',
  lineNumbers: true,
  indentUnit: 4,
  tabSize: 4,
  indentWithTabs: false,
  lineWrapping: false,
  autofocus: true,
  extraKeys: {
    'Tab': (cm) => cm.replaceSelection('    '),
    'Ctrl-Enter': runCode,
  },
  // 자동완성 완전 비활성화
  hintOptions: null,
});

// CodeMirror가 textarea를 대체한 후 컨테이너에 맞게 높이 설정
function resizeEditor() {
  const container = document.getElementById('editor-container');
  cm.setSize('100%', container.clientHeight + 'px');
}
window.addEventListener('resize', resizeEditor);
setTimeout(resizeEditor, 50);

// ── 문제 목록 로드 ──
let currentPid = null;

async function loadProblems() {
  const res = await fetch('/api/problems');
  const problems = await res.json();
  const sel = document.getElementById('problem-select');
  sel.innerHTML = '<option value="">-- 문제 선택 --</option>';
  problems.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.id + 1}. ${p.title}`;
    sel.appendChild(opt);
  });
}

document.getElementById('problem-select').addEventListener('change', async (e) => {
  const pid = e.target.value;
  if (pid === '') return;
  currentPid = parseInt(pid);
  await loadProblem(currentPid);
});

async function loadProblem(pid) {
  const res = await fetch(`/api/problem/${pid}`);
  const data = await res.json();

  // markdown → HTML
  const descEl = document.getElementById('problem-desc');
  descEl.innerHTML = marked.parse(data.description);

  // KaTeX 수식 렌더링
  if (window.renderMathInElement) {
    renderMathInElement(descEl, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true},
      ]
    });
  }

  // 에디터 초기화 (빈 칸)
  cm.setValue('');
  cm.focus();
  document.getElementById('output').innerHTML = '<span class="out-info">실행 결과가 여기에 표시됩니다.</span>';
}

// ── 코드 실행 ──
async function runCode() {
  const code = cm.getValue();
  if (!code.trim()) return;

  document.getElementById('output').innerHTML = '<span class="out-info">실행 중...</span>';

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code}),
    });
    const data = await res.json();

    let html = '';
    if (data.stdout) html += `<span class="out-stdout">${escHtml(data.stdout)}</span>`;
    if (data.stderr) html += `<span class="out-stderr">${escHtml(data.stderr)}</span>`;
    if (!data.stdout && !data.stderr) html = '<span class="out-info">(출력 없음)</span>';
    if (data.returncode !== 0 && data.returncode !== -1) {
      html += `<span class="out-stderr">\n종료 코드: ${data.returncode}</span>`;
    }
    document.getElementById('output').innerHTML = html;
  } catch (err) {
    document.getElementById('output').innerHTML = `<span class="out-stderr">오류: ${err.message}</span>`;
  }
}

document.getElementById('btn-run').addEventListener('click', runCode);

// ── 정답 보기 ──
document.getElementById('btn-reveal').addEventListener('click', async () => {
  if (currentPid === null) return;
  const res = await fetch(`/api/reveal/${currentPid}`);
  const data = await res.json();

  const outputEl = document.getElementById('output');
  outputEl.innerHTML +=
    `<span class="out-answer-label">── 모범 답안 ──</span><span class="out-answer">${escHtml(data.answer)}</span>`;
  outputEl.scrollTop = outputEl.scrollHeight;
});

// ── 리사이저 (패널 드래그) ──
const resizer = document.getElementById('resizer');
const problemPanel = document.getElementById('problem-panel');
let isResizing = false;
resizer.addEventListener('mousedown', () => { isResizing = true; });
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const main = document.getElementById('main');
  const rect = main.getBoundingClientRect();
  const newWidth = Math.max(200, Math.min(e.clientX - rect.left, rect.width - 300));
  problemPanel.style.width = newWidth + 'px';
  resizeEditor();
});
document.addEventListener('mouseup', () => { isResizing = false; });

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadProblems();
</script>
</body>
</html>
